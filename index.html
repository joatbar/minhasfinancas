<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro | joatbar</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --success: #10b981; --danger: #f43f5e; --text-main: #f8fafc;
            --text-dim: #94a3b8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; }

        /* LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-card {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 100%; max-width: 380px; text-align: center;
        }
        input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border);
            background: #161e2d; color: white; outline: none; margin-bottom: 15px;
        }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        /* DASHBOARD LAYOUT */
        #main-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        
        /* TABS */
        .tabs-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; cursor: pointer; white-space: nowrap; color: var(--text-dim);
            transition: all 0.2s;
        }
        .tab.active { background: var(--primary); color: #000; font-weight: 700; border-color: var(--primary); }
        .btn-add-tab { background: var(--success); color: #000; font-weight: 700; }

        header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 26px; border: 1px solid var(--border); }
        .card-title { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        .item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .item-val { cursor: pointer; }
        .item-val:hover { color: var(--danger); text-decoration: line-through; }

        .btn-add { background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--primary); color: var(--primary); width: 100%; padding: 12px; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: 600; }
        .btn-delete-month { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.75rem; text-decoration: underline; margin-top: 5px; }

        .val-plus { color: var(--success); font-weight: 600; }
        .val-minus { color: var(--danger); font-weight: 600; }
        .summary-value { font-size: 1.8rem; font-weight: 700; margin-top: 8px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-bottom: 20px;">Finance<span style="color: var(--primary)">Pro</span></h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-login" onclick="autenticar()">ENTRAR</button>
        <p id="error-msg" style="color: var(--danger); font-size: 0.8rem; margin-top: 15px; display: none;">Acesso negado!</p>
    </div>
</div>

<div id="main-content">
    <header>
        <div>
            <h1>Olá, <span style="color: var(--primary)">joatbar</span></h1>
            <button onclick="logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.8rem; text-decoration:underline;">Sair do Sistema</button>
        </div>
        <button class="btn-delete-month" onclick="excluirMesAtual()">Excluir Mês Atual</button>
    </header>

    <div class="tabs-container" id="abas-meses">
        <!-- Meses entram aqui -->
    </div>

    <div class="dashboard-grid">
        <div class="card">
            <span class="card-title">Receitas</span>
            <div id="lista-entradas"></div>
            <button class="btn-add" onclick="novoItem('entrada')">+ Receita</button>
        </div>

        <div class="card">
            <span class="card-title">Despesas</span>
            <div id="lista-saidas"></div>
            <button class="btn-add" onclick="novoItem('saida')">+ Despesa</button>
        </div>

        <div class="card">
            <span class="card-title">Resumo do Mês</span>
            <div style="margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 0.8rem;">TOTAL RECEBIDO</p>
                <p id="res-entradas" class="val-plus">R$ 0,00</p>
            </div>
            <div style="margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 0.8rem;">TOTAL GASTO</p>
                <p id="res-saidas" class="val-minus">R$ 0,00</p>
            </div>
            <div style="padding-top: 20px; border-top: 2px solid var(--border);">
                <p id="res-saldo" class="summary-value" style="color: var(--primary)">R$ 0,00</p>
            </div>
        </div>
    </div>
</div>

<script>
    const LOGIN_USER = "joatbar", LOGIN_PASS = "filadelfia";
    
    // Banco de dados organizado por meses
    let db = JSON.parse(localStorage.getItem('financas_multi')) || {
        meses: [
            { id: "MAIO2024", nome: "MAIO / 2024", entradas: [], saidas: [] }
        ],
        atualId: "MAIO2024"
    };

    function autenticar() {
        if (document.getElementById('user').value === LOGIN_USER && document.getElementById('pass').value === LOGIN_PASS) {
            sessionStorage.setItem('ativa', 'true');
            verificar();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function verificar() {
        if (sessionStorage.getItem('ativa') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderizarAbas();
            renderizarDados();
        }
    }

    function logout() { sessionStorage.removeItem('ativa'); window.location.reload(); }

    function renderizarAbas() {
        const container = document.getElementById('abas-meses');
        container.innerHTML = '';
        
        db.meses.forEach(mes => {
            const btn = document.createElement('div');
            btn.className = `tab ${db.atualId === mes.id ? 'active' : ''}`;
            btn.innerText = mes.nome;
            btn.onclick = () => { db.atualId = mes.id; salvar(); };
            container.appendChild(btn);
        });

        const btnAdd = document.createElement('div');
        btnAdd.className = 'tab btn-add-tab';
        btnAdd.innerText = '+ Novo Mês';
        btnAdd.onclick = criarMes;
        container.appendChild(btnAdd);
    }

    function criarMes() {
        const nome = prompt("Nome do Mês (Ex: JUNHO / 2024):");
        if (nome) {
            const id = nome.replace(/\s/g, '').toUpperCase();
            if (db.meses.find(m => m.id === id)) return alert("Este mês já existe!");
            
            db.meses.push({ id, nome: nome.toUpperCase(), entradas: [], saidas: [] });
            db.atualId = id;
            salvar();
        }
    }

    function excluirMesAtual() {
        if (db.meses.length === 1) return alert("Você deve ter pelo menos um mês cadastrado!");
        if (confirm(`Tem certeza que deseja excluir o mês ${db.atualId} e todos os seus dados?`)) {
            db.meses = db.meses.filter(m => m.id !== db.atualId);
            db.atualId = db.meses[0].id;
            salvar();
        }
    }

    function novoItem(tipo) {
        const mes = db.meses.find(m => m.id === db.atualId);
        const desc = prompt("Descrição:");
        const valorRaw = prompt("Valor:");
        if (desc && valorRaw) {
            const val = parseFloat(valorRaw.replace(',', '.'));
            if (!isNaN(val)) {
                if (tipo === 'entrada') mes.entradas.push({desc: desc.toUpperCase(), val});
                else mes.saidas.push({desc: desc.toUpperCase(), val});
                salvar();
            }
        }
    }

    function removerItem(tipo, index, desc) {
        const mes = db.meses.find(m => m.id === db.atualId);
        if (confirm(`Excluir "${desc}"?`)) {
            if (tipo === 'entrada') mes.entradas.splice(index, 1);
            else mes.saidas.splice(index, 1);
            salvar();
        }
    }

    function salvar() {
        localStorage.setItem('financas_multi', JSON.stringify(db));
        renderizarAbas();
        renderizarDados();
    }

    function renderizarDados() {
        const mes = db.meses.find(m => m.id === db.atualId);
        const listE = document.getElementById('lista-entradas'), listS = document.getElementById('lista-saidas');
        let tE = 0, tS = 0;
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        listE.innerHTML = '';
        mes.entradas.forEach((item, i) => {
            tE += item.val;
            listE.innerHTML += `<div class="item"><span>${item.desc}</span><span class="item-val val-plus" onclick="removerItem('entrada', ${i}, '${item.desc}')">${f(item.val)}</span></div>`;
        });

        listS.innerHTML = '';
        mes.saidas.forEach((item, i) => {
            tS += item.val;
            listS.innerHTML += `<div class="item"><span>${item.desc}</span><span class="item-val val-minus" onclick="removerItem('saida', ${i}, '${item.desc}')">${f(item.val)}</span></div>`;
        });

        document.getElementById('res-entradas').innerText = f(tE);
        document.getElementById('res-saidas').innerText = f(tS);
        document.getElementById('res-saldo').innerText = f(tE - tS);
    }

    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') autenticar(); });
    verificar();
</script>
</body>
</html>
