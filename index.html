<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinancePro Cloud | joatbar</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --success: #10b981; --danger: #f43f5e; --text-main: #f8fafc;
            --text-dim: #94a3b8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        /* LOGIN */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .login-card {
            background: var(--card-bg); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 90%; max-width: 380px; text-align: center;
        }
        input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--border);
            background: #161e2d; color: white; outline: none; margin-bottom: 15px;
        }
        .btn-login { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: 700; cursor: pointer; color: #000; }

        /* DASHBOARD */
        #main-content { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        
        .tabs-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px;
            border-bottom: 1px solid var(--border); scrollbar-width: none;
        }
        .tab {
            padding: 10px 20px; background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 12px; cursor: pointer; white-space: nowrap; color: var(--text-dim);
        }
        .tab.active { background: var(--primary); color: #000; font-weight: 700; border-color: var(--primary); }
        .btn-add-tab { background: var(--success); color: #000; font-weight: 700; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .card { background: var(--card-bg); border-radius: 18px; padding: 26px; border: 1px solid var(--border); }
        .card-title { font-size: 0.8rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; display: block; }
        
        .item { display: flex; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        .item-val { cursor: pointer; }
        .item-val:hover { color: var(--danger); text-decoration: line-through; }

        .btn-add { background: rgba(56, 189, 248, 0.1); border: 1px dashed var(--primary); color: var(--primary); width: 100%; padding: 12px; border-radius: 10px; margin-top: 20px; cursor: pointer; font-weight: 600; }
        .btn-delete-month { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.75rem; text-decoration: underline; }

        .val-plus { color: var(--success); font-weight: 600; }
        .val-minus { color: var(--danger); font-weight: 600; }
        .summary-value { font-size: 1.8rem; font-weight: 700; margin-top: 8px; }
        
        #loading-cloud { position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 style="margin-bottom: 20px;">Finance<span style="color: var(--primary)">Pro</span></h2>
        <input type="text" id="user" placeholder="Usuário" autocomplete="off">
        <input type="password" id="pass" placeholder="Senha">
        <button class="btn-login" onclick="window.autenticar()">ENTRAR</button>
        <p id="error-msg" style="color: var(--danger); font-size: 0.8rem; margin-top: 15px; display: none;">Acesso negado!</p>
    </div>
</div>

<div id="main-content">
    <header>
        <div>
            <h1>Olá, <span style="color: var(--primary)">joatbar</span></h1>
            <button onclick="window.logout()" style="background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:0.8rem; text-decoration:underline;">Sair</button>
        </div>
        <button class="btn-delete-month" onclick="window.excluirMesAtual()">Excluir Mês Atual</button>
    </header>

    <div class="tabs-container" id="abas-meses"></div>

    <div class="dashboard-grid">
        <div class="card">
            <span class="card-title">Receitas</span>
            <div id="lista-entradas"></div>
            <button class="btn-add" onclick="window.novoItem('entrada')">+ Receita</button>
        </div>

        <div class="card">
            <span class="card-title">Despesas</span>
            <div id="lista-saidas"></div>
            <button class="btn-add" onclick="window.novoItem('saida')">+ Despesa</button>
        </div>

        <div class="card">
            <span class="card-title">Resumo do Mês</span>
            <div style="margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 0.8rem;">TOTAL RECEBIDO</p>
                <p id="res-entradas" class="val-plus">R$ 0,00</p>
            </div>
            <div style="margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 0.8rem;">TOTAL GASTO</p>
                <p id="res-saidas" class="val-minus">R$ 0,00</p>
            </div>
            <div style="padding-top: 20px; border-top: 2px solid var(--border);">
                <p id="res-saldo" class="summary-value" style="color: var(--primary)">R$ 0,00</p>
            </div>
        </div>
    </div>
</div>

<div id="loading-cloud">☁️ Sincronizado com a nuvem</div>

<script type="module">
    import { initializeApp } from "https://gstatic.com";
    import { getDatabase, ref, set, onValue } from "https://gstatic.com";

    // 1. COLE SEUS DADOS DO FIREBASE AQUI (Não esqueça de preencher!)
    const firebaseConfig = {
        apiKey: "AIzaSyDCGdGQWcVJUjC4dzkJSqHqRuL8lcd_r3c",
  authDomain: "financepro-joatbar.firebaseapp.com",
  databaseURL: "https://financepro-joatbar-default-rtdb.firebaseio.com",
  projectId: "financepro-joatbar",
  storageBucket: "financepro-joatbar.firebasestorage.app",
  messagingSenderId: "646514088624",
  appId: "1:646514088624:web:5528c4ebe19d4e5ed8f975"
    };

    // 2. INICIALIZAÇÃO
    const app = initializeApp(firebaseConfig);
    const dbCloud = getDatabase(app);
    const LOGIN_USER = "joatbar", LOGIN_PASS = "filadelfia";

    let db = { meses: [{ id: "MAIO2024", nome: "MAIO / 2024", entradas: [], saidas: [] }], atualId: "MAIO2024" };

    // 3. FUNÇÃO DE LOGIN (CORRIGIDA)
    window.autenticar = function() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;

        if (u === LOGIN_USER && p === LOGIN_PASS) {
            sessionStorage.setItem('ativa', 'true');
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Puxar dados da nuvem assim que logar
            renderizarTudo();
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    };

    // ESCUTAR NUVEM CONSTANTEMENTE
    onValue(ref(dbCloud, 'finance_db/'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
            db = data;
            // Só renderiza se o usuário já estiver logado
            if (sessionStorage.getItem('ativa') === 'true') {
                renderizarTudo();
            }
        }
    });

    // 4. RESTANTE DAS FUNÇÕES (EXPORTADAS PARA O WINDOW)
    window.salvar = () => {
        set(ref(dbCloud, 'finance_db/'), db);
    };

    window.logout = () => { sessionStorage.removeItem('ativa'); window.location.reload(); };

    window.novoItem = (tipo) => {
        const mes = db.meses.find(m => m.id === db.atualId);
        const desc = prompt("Descrição:");
        const valorRaw = prompt("Valor:");
        if (desc && valorRaw) {
            const val = parseFloat(valorRaw.replace(',', '.'));
            if (!isNaN(val)) {
                if (tipo === 'entrada') {
                    if(!mes.entradas) mes.entradas = [];
                    mes.entradas.push({desc: desc.toUpperCase(), val});
                } else {
                    if(!mes.saidas) mes.saidas = [];
                    mes.saidas.push({desc: desc.toUpperCase(), val});
                }
                window.salvar();
            }
        }
    };

    window.removerItem = (tipo, index, desc) => {
        const mes = db.meses.find(m => m.id === db.atualId);
        if (confirm(`Excluir "${desc}"?`)) {
            if (tipo === 'entrada') mes.entradas.splice(index, 1);
            else mes.saidas.splice(index, 1);
            window.salvar();
        }
    };

    window.criarMes = () => {
        const nome = prompt("Nome do Mês (Ex: JUNHO / 2024):");
        if (nome) {
            const id = nome.replace(/\s/g, '').toUpperCase() + Math.floor(Math.random() * 1000);
            db.meses.push({ id, nome: nome.toUpperCase(), entradas: [], saidas: [] });
            db.atualId = id;
            window.salvar();
        }
    };

    window.excluirMesAtual = () => {
        if (db.meses.length === 1) return alert("Mantenha ao menos um mês.");
        if (confirm("Excluir este mês e todos os dados?")) {
            db.meses = db.meses.filter(m => m.id !== db.atualId);
            db.atualId = db.meses[0].id;
            window.salvar();
        }
    };

    function renderizarTudo() {
        const abas = document.getElementById('abas-meses');
        if(!abas) return;
        
        abas.innerHTML = '';
        db.meses.forEach(mes => {
            const div = document.createElement('div');
            div.className = `tab ${db.atualId === mes.id ? 'active' : ''}`;
            div.innerText = mes.nome;
            div.onclick = () => { db.atualId = mes.id; renderizarTudo(); };
            abas.appendChild(div);
        });

        const btnAdd = document.createElement('div');
        btnAdd.className = 'tab btn-add-tab';
        btnAdd.innerText = '+ Novo';
        btnAdd.onclick = window.criarMes;
        abas.appendChild(btnAdd);

        const mes = db.meses.find(m => m.id === db.atualId);
        const listE = document.getElementById('lista-entradas'), listS = document.getElementById('lista-saidas');
        let tE = 0, tS = 0;
        const f = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        listE.innerHTML = '';
        if(mes.entradas) {
            mes.entradas.forEach((item, i) => {
                tE += item.val;
                listE.innerHTML += `<div class="item"><span>${item.desc}</span><span class="item-val val-plus" onclick="window.removerItem('entrada', ${i}, '${item.desc}')">${f(item.val)}</span></div>`;
            });
        }

        listS.innerHTML = '';
        if(mes.saidas) {
            mes.saidas.forEach((item, i) => {
                tS += item.val;
                listS.innerHTML += `<div class="item"><span>${item.desc}</span><span class="item-val val-minus" onclick="window.removerItem('saida', ${i}, '${item.desc}')">${f(item.val)}</span></div>`;
            });
        }

        document.getElementById('res-entradas').innerText = f(tE);
        document.getElementById('res-saidas').innerText = f(tS);
        document.getElementById('res-saldo').innerText = f(tE - tS);
    }

    // AUTO-LOGIN (Se já estiver logado na sessão)
    if (sessionStorage.getItem('ativa') === 'true') {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
    }

    // Atalho Enter
    document.addEventListener('keypress', (e) => { if (e.key === 'Enter') window.autenticar(); });

</script>

</body>
</html>
